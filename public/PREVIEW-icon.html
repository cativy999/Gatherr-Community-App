<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Preview — App Icon</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #cfe0ff, #eef3ff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .note {
    position: fixed; top: 0; left: 0; width: 100%;
    background: #fff7d6; border-bottom: 1px solid #e8d98a; color: #5c4a00;
    font-size: 13px; text-align: center; padding: 8px 12px;
  }
  .row { display: flex; gap: 48px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .icon-shadow {
    width: 100px; height: 100px; border-radius: 22px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  .icon-shadow img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .label { font-size: 13px; color: #333; font-weight: 600; }
  .old {
    width: 100px; height: 100px; border-radius: 22px;
    background: #b9bec7; color: #fff; font-size: 44px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
  <div class="note">⚠️ Static preview — mockup of how the "Add to Home Screen" icon will look now vs. before.</div>
  <div class="row">
    <div class="item">
      <div class="old">G</div>
      <div class="label">Before</div>
    </div>
    <div class="item">
      <div class="icon-shadow"><img src="icons/icon-192.png" alt="New icon" /></div>
      <div class="label">After (Android)</div>
    </div>
    <div class="item">
      <div class="icon-shadow"><img src="icons/apple-touch-icon.png" alt="New apple touch icon" /></div>
      <div class="label">After (iOS)</div>
    </div>
  </div>
</body>
</html>
